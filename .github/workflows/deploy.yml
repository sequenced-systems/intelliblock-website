name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

      - name: Start preview server
        run: npx serve@latest out --listen 3000 &

      - name: Wait for server ready
        run: npx wait-on@latest http://localhost:3000 --timeout 30000

      - name: Accessibility audit (WCAG 2.1 AA)
        run: npx axe-cli@latest http://localhost:3000/ http://localhost:3000/about/ http://localhost:3000/services/ http://localhost:3000/contact/ --tags wcag2a,wcag2aa --exit

      - name: Performance audit (Lighthouse CI)
        run: npx @lhci/cli@latest autorun --config=.lighthouserc.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4a2e02b36f31d8974a0d09d3bb9f3172aa2d0d0d
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          cname: www.intelliblockconsulting.com
