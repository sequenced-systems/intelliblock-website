name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=critical

      - name: Build
        run: npm run build

      - name: Start preview server
        run: npx serve@latest out --listen 3000 &

      - name: Wait for server ready
        run: npx wait-on@latest http://localhost:3000 --timeout 30000

      - name: Performance audit (Lighthouse CI)
        run: npx @lhci/cli@latest autorun --config=.lighthouserc.json

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=intelliblock-website --commit-dirty=true
