  <rect x="800" y="508" width="300" height="1" fill="rgba(255,255,255,0.1)"/>
  <text x="800" y="530" font-family="'Inter', -apple-system, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.8)">Bakassi Deep Seaport</text>
  <text x="800" y="548" font-family="'Inter', -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">CRS · Nigeria · Active signal · 2026</text>
