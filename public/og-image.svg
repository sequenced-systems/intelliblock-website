  <text x="800" y="472" font-family="'Inter', -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">C5 Risk Profile</text>
  <rect x="800" y="480" width="300" height="4" rx="2" fill="#1E3050"/>
  <rect x="800" y="480" width="210" height="4" rx="2" fill="#C4922A"/>

