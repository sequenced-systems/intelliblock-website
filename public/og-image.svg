  <!-- Main headline -->
  <text x="80" y="210" font-family="'Inter', -apple-system, sans-serif" font-size="52" font-weight="700" fill="#FFFFFF" letter-spacing="-0.02em">Nigeria Infrastructure</text>
  <text x="80" y="278" font-family="'Inter', -apple-system, sans-serif" font-size="52" font-weight="700" fill="#FFFFFF" letter-spacing="-0.02em">Bankability Intelligence</text>

