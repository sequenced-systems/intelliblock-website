  <text x="870" y="250" font-family="'Inter', -apple-system, sans-serif" font-size="72" font-weight="700" fill="#C4922A" text-anchor="middle">77</text>
  <text x="920" y="250" font-family="'Inter', -apple-system, sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.4)">/100</text>
  <text x="870" y="278" font-family="'Inter', -apple-system, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">Tier 2 Bankable</text>

