  <rect x="780" y="80" width="340" height="470" rx="8" fill="#1A2E4A" stroke="#2A3F5C" stroke-width="1"/>
  <rect x="780" y="80" width="340" height="4" rx="0" fill="#C4922A"/>

  <text x="800" y="130" font-family="'Inter', -apple-system, sans-serif" font-size="11" font-weight="600" letter-spacing="0.08em" fill="rgba(255,255,255,0.5)">BANKABILITY SCORE</text>
