  <rect x="800" y="366" width="300" height="4" rx="2" fill="#1E3050"/>
  <rect x="800" y="366" width="240" height="4" rx="2" fill="#C4922A"/>

  <text x="800" y="396" font-family="'Inter', -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">C3 Revenue Model</text>
  <rect x="800" y="404" width="300" height="4" rx="2" fill="#1E3050"/>
